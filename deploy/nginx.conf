# Nginx Configuration for WEPAC
# ======================================
# Location: /etc/nginx/sites-available/wepac
# After changes: sudo nginx -t && sudo systemctl reload nginx

# Upstream Node.js
upstream wepac_node {
    server 127.0.0.1:3003;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name wepac.pt www.wepac.pt;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/wepac/current/public;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://wepac.pt$request_uri;
    }
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.wepac.pt;

    ssl_certificate /etc/letsencrypt/live/wepac.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wepac.pt/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://wepac.pt$request_uri;
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wepac.pt;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/wepac.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wepac.pt/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root (for static assets)
    root /var/www/wepac/current/public;

    # Logging
    access_log /var/log/nginx/wepac_access.log;
    error_log /var/log/nginx/wepac_error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Next.js static assets (immutable cache)
    location /_next/static/ {
        alias /var/www/wepac/current/.next/static/;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Public static files
    location /images/ {
        alias /var/www/wepac/current/public/images/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /logo/ {
        alias /var/www/wepac/current/public/logo/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy everything else to Next.js
    location / {
        proxy_pass http://wepac_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Error pages
    error_page 500 502 503 504 /500.html;
    error_page 404 /404.html;
}
